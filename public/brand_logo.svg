<?xml version="1.0" encoding="UTF-8"?>
<!--Logo of 1Loom is a Registered Trademark-->
<svg width="600" height="600" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="headerGrad" x1="0" x2="1" y1="0" y2="0">
            <stop offset="0%" stop-color="#FF6E45"/>
            <stop offset="100%" stop-color="#FF3C6E"/>
        </linearGradient>
        <linearGradient id="bodyGrad" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#28E0C2"/>
            <stop offset="100%" stop-color="#12C6D9"/>
        </linearGradient>
        <linearGradient id="camGrad" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#5D4BFF"/>
            <stop offset="100%" stop-color="#4C55E2"/>
        </linearGradient>
        <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="18" stdDeviation="30" flood-color="#000" flood-opacity="0.12"/>
        </filter>
        <style type="text/css">
            .st0{fill:url(#headerGrad)}
        </style>
    </defs>
    <!-- Background -->
    <rect width="1200" height="1200" fill="none"/> <!--FBF6F4-->
    <!-- Calendar card with shadow -->
    <g transform="translate(200,120)" filter="url(#cardShadow)">
        <!-- Outer rounded card -->
        <rect x="0" y="0" rx="90" ry="90" width="700" height="700" fill="url(#bodyGrad)"/>
        <!-- Header bar -->
        <path d="M0,160 H700 V80 a80,80 0 0 0 -80,-80 H80 a80,80 0 0 0 -80,80 V160 Z"
              fill="url(#headerGrad)"
        />
        <!-- Ring left (top hanger) -->
        <g transform="translate(140,-70)">
            <rect x="-5" y="58" rx="40" ry="56" width="125" height="130" fill="none" stroke="#000000" stroke-width="18" opacity="0.45"/>
            <rect x="0" y="0" rx="56" ry="56" width="120" height="180" fill="url(#headerGrad)"/>
        </g>
        <!-- Ring right (top hanger) -->
        <g transform="translate(450,-70)">
            <rect x="-5" y="58" rx="40" ry="56" width="125" height="130" fill="none" stroke="#000000" stroke-width="18" opacity="0.45"/>
            <rect x="0" y="0" rx="56" ry="56" width="120" height="180" fill="url(#headerGrad)"/>
        </g>
        <!-- Small rounded squares (days) - left grid 3x3 -->
        <g transform="translate(85,220)">
            <!-- positions (col*spacing, row*spacing) -->
            <!-- square style -->
            <style> .day { rx:18; ry:18; width:110; height:110; fill:#FFD94D; } </style>
            <rect x="0" y="0" rx="18" ry="18" width="110" height="110" fill="#ffffff"/>
            <rect x="140" y="0" rx="18" ry="18" width="110" height="110" fill="#FFD94D"/>
            <rect x="280" y="0" rx="18" ry="18" width="110" height="110" fill="#FFD94D"/>
            <rect x="0" y="140" rx="18" ry="18" width="110" height="110" fill="#ffffff"/>
            <rect x="140" y="140" rx="18" ry="18" width="110" height="110" fill="#FFD94D"/>
            <!-- <rect x="280" y="140" rx="18" ry="18" width="110" height="110" fill="#FFD94D"/> -->
            <rect x="0" y="280" rx="18" ry="18" width="110" height="110" fill="#ffffff"/>
        </g>
        <!-- Video camera badge on right -->
        <g transform="translate(360,360)">
            <!-- camera triangle (lens) -->
            <path d=" M240 70 Q240 60 250 60 L290 90 Q300 100 290 110 L250 140 Q240 140 240 130 Z " transform="translate(510,-40) scale(-1,1.5)" fill="url(#camGrad)" opacity="0.9" />
            <!-- rounded square background for camera -->
            <rect x="0" y="0" rx="48" ry="48" width="230" height="230" fill="url(#camGrad)"/>
        </g>
